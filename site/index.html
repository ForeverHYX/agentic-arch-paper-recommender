<!doctype html>
<html lang="zh-CN" data-theme="light" style="color-scheme: light">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>每日 arXiv 推荐</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap">
    <link rel="stylesheet" href="styles.css?v=20260614-articles-layout">
    <script>
      (function () {
        try {
          var saved = localStorage.getItem("theme");
          var sysDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          var theme = saved === "dark" || (!saved && sysDark) ? "dark" : "light";
          document.documentElement.setAttribute("data-theme", theme);
          document.documentElement.style.colorScheme = theme;
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "light");
          document.documentElement.style.colorScheme = "light";
        }
      })();
    </script>
  </head>
  <body>
    <div class="home-lightfield" aria-hidden="true"></div>
    <header class="site-header">
      <div class="container nav-shell">
        <div class="nav-cluster" id="navCluster">
          <div class="nav-island home-liquid-card" id="navIsland">
            <span class="home-liquid-warp nav-island-warp" aria-hidden="true"></span>
            <div class="nav-island-body">
              <a class="brand nav-brand" href="index.html">
                <svg class="nav-brand-icon" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2Zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"/><path d="M18 14h-8"/><path d="M15 18h-5"/><path d="M10 6h8v4h-8V6Z"/></svg>
                <span class="nav-brand-label nav-brand-label-full">Yixun Hong&rsquo;s Daily Paper</span>
                <span class="nav-brand-label nav-brand-label-short">Daily Paper</span>
              </a>
              <div class="nav-main">
                <nav id="readerTabs" class="reader-tabs nav-links nav-links-desktop" aria-label="推荐领域">
                  <button type="button" class="nav-link reader-tab is-active" data-tab="all">全部</button>
                  <button type="button" class="nav-link reader-tab" data-tab="repository">仓库</button>
                  <button type="button" class="nav-link reader-tab" data-tab="profile">画像与系统</button>
                </nav>
                <div class="nav-divider" aria-hidden="true"></div>
                <div id="inlineSearchBar" class="search-bar-container">
                  <svg class="search-bar-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                  <input type="text" id="inlineSearchInput" class="search-input" placeholder="搜索标题或关键词..." autocomplete="off">
                  <button type="button" class="search-close-btn" id="searchCloseBtn" aria-label="关闭搜索">&times;</button>
                </div>
                <div class="nav-actions">
                  <button type="button" id="searchTrigger" class="action-btn search-trigger" title="搜索" aria-expanded="false">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                  </button>
                  <button type="button" id="themeToggle" class="action-btn nav-theme-toggle" title="切换主题">
                    <svg class="theme-icon-moon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
                    <svg class="theme-icon-sun" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </header>
    <main class="site-main">
      <div class="container">
        <div class="page-shell">
          <div id="recommendationWorkspace" class="article-grid is-active">
            <div class="page-stack">
              <p id="runDate" class="page-lead" hidden></p>
              <div id="filterBar" class="article-filter-bar"></div>
              <section id="recommendations" class="paper-list" aria-live="polite"></section>
            </div>
            <aside class="sidebar">
              <div class="sidebar-card home-liquid-card home-news-card filter-sidebar">
                <span class="home-liquid-warp" aria-hidden="true"></span>
                <div class="home-liquid-body">
                  <div id="summaryStats" class="summary-stats" aria-live="polite"></div>
                  <div id="resultCount" class="result-count" aria-live="polite"></div>
                  <div class="sidebar-title">筛选</div>
                  <div class="controls">
                    <label class="filter-row">
                      <span>搜索</span>
                      <input id="searchInput" type="search" autocomplete="off">
                    </label>
                    <label class="filter-row">
                      <span>栏目</span>
                      <select id="sectionFilter"></select>
                    </label>
                    <label class="filter-row">
                      <span>最低 AI 分</span>
                      <input id="minAiScore" type="number" min="0" max="10" step="1">
                    </label>
                    <label class="filter-row">
                      <span>排序</span>
                      <select id="sortSelect">
                        <option value="rank">推荐顺序</option>
                        <option value="ai">AI 分</option>
                        <option value="rule">规则分</option>
                        <option value="title">标题</option>
                      </select>
                    </label>
                    <label class="check-row">
                      <input id="hasCodeFilter" type="checkbox">
                      <span>有代码仓库</span>
                    </label>
                    <label class="check-row">
                      <input id="hasAffiliationFilter" type="checkbox">
                      <span>有作者单位</span>
                    </label>
                  </div>
                  <div id="keywordFilters" class="keyword-filters">
                    <div class="sidebar-title">类型关键词</div>
                    <div id="typeKeywordFilters" class="keyword-chip-list" aria-live="polite"></div>
                    <div class="sidebar-title">内容关键词</div>
                    <div id="contentKeywordFilters" class="keyword-chip-list" aria-live="polite"></div>
                  </div>
                  <div class="sidebar-title">栏目</div>
                  <nav id="sectionNav" class="section-nav"></nav>
                </div>
              </div>
            </aside>
          </div>
          <section id="profileSystemWorkspace" class="profile-system-workspace is-hidden">
            <div class="profile-system-grid">
              <section class="profile-system-panel">
                <h2>画像与系统</h2>
                <p class="profile-note">查看每日运行质量、反馈学习状态和推荐画像设置。</p>
                <a class="profile-link" href="profile.html">编辑兴趣画像</a>
              </section>
              <section class="profile-system-panel">
                <div id="runHealth" class="run-health" aria-live="polite"></div>
              </section>
              <details id="statusDetails" class="sidebar-details profile-system-panel" open>
                <summary>反馈与系统细节</summary>
                <div id="feedbackStatus" class="feedback-status" aria-live="polite"></div>
                <div id="feedbackInsights" class="feedback-insights" aria-live="polite"></div>
                <div id="subsystemStatus" class="subsystem-status" aria-live="polite"></div>
              </details>
            </div>
          </section>
        </div>
      </div>
    </main>
    <footer>
      <div class="container">
        &copy; <span id="footerYear"></span> Yixun Hong&rsquo;s Daily Paper · 每日 arXiv 推荐
      </div>
    </footer>
    <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>
    <script src="config.js?v=20260614-articles-layout"></script>
    <script src="effects/lightfield.js?v=20260614-articles-layout" defer></script>
    <script src="effects/liquid-glass.js?v=20260614-articles-layout" defer></script>
    <script src="effects/site-header.js?v=20260614-articles-layout" defer></script>
    <script src="app.js?v=20260614-articles-layout"></script>
  </body>
</html>
