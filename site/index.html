<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Daily arXiv Recommender</title>
    <link rel="stylesheet" href="styles.css?v=20260612-feedback-metrics">
  </head>
  <body>
    <header class="topbar">
      <div class="hero-copy">
        <p class="eyebrow">Personal arXiv radar</p>
        <h1>Daily arXiv Recommender</h1>
        <p id="runDate">Loading...</p>
      </div>
      <div id="summaryStats" class="summary-stats" aria-live="polite"></div>
    </header>
    <main class="layout">
      <aside class="sidebar" aria-label="Recommendation sections">
        <div class="sidebar-title">Filters</div>
        <div class="controls">
          <label class="filter-row">
            <span>Search</span>
            <input id="searchInput" type="search" autocomplete="off">
          </label>
          <label class="filter-row">
            <span>Section</span>
            <select id="sectionFilter"></select>
          </label>
          <label class="filter-row">
            <span>Min AI</span>
            <input id="minAiScore" type="number" min="0" max="10" step="1">
          </label>
          <label class="filter-row">
            <span>Sort</span>
            <select id="sortSelect">
              <option value="rank">Rank</option>
              <option value="ai">AI score</option>
              <option value="rule">Rule score</option>
              <option value="title">Title</option>
            </select>
          </label>
          <label class="check-row">
            <input id="hasCodeFilter" type="checkbox">
            <span>Code repo</span>
          </label>
          <label class="check-row">
            <input id="hasAffiliationFilter" type="checkbox">
            <span>Affiliation</span>
          </label>
          <div id="feedbackStatus" class="feedback-status" aria-live="polite"></div>
          <div id="feedbackInsights" class="feedback-insights" aria-live="polite"></div>
          <div id="resultCount" class="result-count" aria-live="polite"></div>
        </div>
        <div class="sidebar-title">Sections</div>
        <nav id="sectionNav" class="section-nav"></nav>
      </aside>
      <section id="recommendations" class="paper-list" aria-live="polite"></section>
    </main>
    <script src="config.js?v=20260612-feedback-metrics"></script>
    <script src="app.js?v=20260612-feedback-metrics"></script>
  </body>
</html>
