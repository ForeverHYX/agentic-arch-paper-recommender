<!doctype html>
<html lang="zh-CN" data-theme="light" style="color-scheme: light">
  <head>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&display=swap">

    <link rel="stylesheet" href="styles.css?v=20260615-keyword-sidebar">
    <script>
      (function () {
        try {
          var saved = localStorage.getItem("theme");
          var sysDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          var theme = saved === "dark" || (!saved && sysDark) ? "dark" : "light";
          document.documentElement.setAttribute("data-theme", theme);
          document.documentElement.style.colorScheme = theme;
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "light");
          document.documentElement.style.colorScheme = "light";
        }
      })();
    </script>
  </head>
  <body>

        <div class="nav-cluster" id="navCluster">

                <span class="nav-brand-label nav-brand-label-full">Yixun Hong&rsquo;s Daily Paper</span>
                <span class="nav-brand-label nav-brand-label-short">Daily Paper</span>
              </a>
              <div class="nav-main">
                <nav id="readerTabs" class="reader-tabs nav-links nav-links-desktop" aria-label="推荐领域">
                  <button type="button" class="nav-link reader-tab is-active" data-tab="all">All</button>
                  <button type="button" class="nav-link reader-tab" data-tab="section:agentic_architecture">Agentic Arch</button>
                  <button type="button" class="nav-link reader-tab" data-tab="section:full_stack_codesign">Codesign</button>
                  <button type="button" class="nav-link reader-tab" data-tab="section:microarchitecture_simulators">Simulator</button>

                </nav>
                <div class="nav-divider" aria-hidden="true"></div>

                  <button type="button" class="search-close-btn" id="searchCloseBtn" aria-label="关闭搜索">&times;</button>
                </div>
                <div class="nav-actions">
                  <button type="button" id="searchTrigger" class="action-btn search-trigger" title="搜索" aria-expanded="false">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                  </button>
                  <button type="button" id="themeToggle" class="action-btn nav-theme-toggle" title="切换主题">

                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

    <main class="site-main">
      <div class="container">
        <div class="page-shell">
          <div id="recommendationWorkspace" class="article-grid is-active">
            <div class="page-stack">
              <p id="runDate" class="page-lead" hidden></p>
              <div id="filterBar" class="article-filter-bar"></div>
              <section id="recommendations" class="paper-list" aria-live="polite"></section>
            </div>
            <aside class="sidebar">
              <div class="sidebar-card home-liquid-card home-news-card filter-sidebar">
                <span class="home-liquid-warp" aria-hidden="true"></span>
                <div class="home-liquid-body">
                  <h3 class="sidebar-card-title">关键词</h3>
                  <div id="keywordFilters" class="keyword-filters">
                    <div id="typeKeywordFilters" class="keyword-chip-list" aria-live="polite"></div>
                    <div id="contentKeywordFilters" class="keyword-chip-list" aria-live="polite"></div>
                  </div>
                </div>
              </div>
            </aside>
          </div>
          <section id="profileSystemWorkspace" class="profile-system-workspace is-hidden">
            <div class="profile-system-grid">
              <section class="profile-system-panel">
                <h2>画像与系统</h2>
                <p class="profile-note">查看每日运行质量、反馈学习状态和推荐画像设置。</p>
                <a class="profile-link" href="profile.html">编辑兴趣画像</a>
              </section>
              <section class="profile-system-panel">
                <div id="runHealth" class="run-health" aria-live="polite"></div>
              </section>
              <details id="statusDetails" class="sidebar-details profile-system-panel" open>
                <summary>反馈与系统细节</summary>
                <div id="feedbackStatus" class="feedback-status" aria-live="polite"></div>
                <div id="feedbackInsights" class="feedback-insights" aria-live="polite"></div>
                <div id="subsystemStatus" class="subsystem-status" aria-live="polite"></div>
              </details>
            </div>
          </section>
        </div>
      </div>
    </main>
    <footer>

        &copy; <span id="footerYear"></span> Yixun Hong&rsquo;s Daily Paper · 每日 arXiv 推荐
