<!doctype html>
<html lang="zh-CN" data-theme="light" style="color-scheme: light">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>论文反馈</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap">
    <link rel="stylesheet" href="styles.css?v=20260614-liquid-glass">
    <script>
      (function () {
        try {
          var saved = localStorage.getItem("theme");
          var sysDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          var theme = saved === "dark" || (!saved && sysDark) ? "dark" : "light";
          document.documentElement.setAttribute("data-theme", theme);
          document.documentElement.style.colorScheme = theme;
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "light");
          document.documentElement.style.colorScheme = "light";
        }
      })();
    </script>
  </head>
  <body>
    <div class="home-lightfield" aria-hidden="true"></div>
    <header class="site-header">
      <div class="container nav-shell">
        <div class="nav-island home-liquid-card">
          <span class="home-liquid-warp nav-island-warp" aria-hidden="true"></span>
          <div class="nav-island-body">
            <a class="brand nav-brand" href="index.html">每日推荐</a>
            <nav class="reader-tabs" aria-label="导航">
              <a class="reader-tab" href="index.html">推荐</a>
              <a class="reader-tab" href="profile.html">画像</a>
              <button type="button" class="reader-tab is-active">反馈</button>
            </nav>
          </div>
        </div>
      </div>
    </header>
    <main class="site-main">
      <main class="feedback">
        <h1 id="statusTitle">正在记录反馈...</h1>
        <p id="statusDetail"></p>
        <textarea id="localFeedbackExport" class="local-feedback-export" readonly hidden></textarea>
        <p><a id="localFeedbackDownload" class="link-button" hidden>下载本地反馈 JSON</a></p>
        <p><a class="link-button" href="index.html">返回推荐列表</a></p>
      </main>
    </main>
    <footer>
      <div class="container">
        每日 arXiv 推荐 · 基于个人兴趣画像的论文与仓库雷达
      </div>
    </footer>
    <script src="config.js?v=20260614-liquid-glass"></script>
    <script src="effects/lightfield.js?v=20260614-liquid-glass" defer></script>
    <script src="effects/liquid-glass.js?v=20260614-liquid-glass" defer></script>
    <script src="feedback.js?v=20260614-liquid-glass"></script>
  </body>
</html>
