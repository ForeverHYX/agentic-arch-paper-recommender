name: Daily Paper Recommender

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  SITE_BASE_URL: https://foreverhyx.github.io/agentic-arch-paper-recommender
  HAS_LLM: ${{ secrets.OPENAI_API_KEY != '' }}
  HAS_SMTP: ${{ secrets.SMTP_HOST != '' && secrets.SMTP_PASSWORD != '' && secrets.EMAIL_SENDER != '' && secrets.EMAIL_RECEIVER != '' }}
  HAS_SUPABASE: ${{ vars.SUPABASE_URL != '' && secrets.SUPABASE_SERVICE_ROLE_KEY != '' }}
  HAS_LOCAL_FEEDBACK: ${{ secrets.LOCAL_FEEDBACK_JSON != '' }}
  HAS_PROFILE_OVERRIDE: ${{ secrets.PROFILE_OVERRIDE_JSON != '' }}
  # Expected public archive repository: ForeverHYX/daily-recommender-paper-favorites
  HAS_FAVORITES_ARCHIVE: ${{ vars.LIKED_PAPERS_REPO != '' && secrets.LIKED_PAPERS_REPO_TOKEN != '' }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Initialize feedback file
        run: |
          mkdir -p output
          echo '[]' > output/feedback.json
          echo '[]' > output/history.json
          cp config/interests.json output/interests.json

      - name: Load profile override secret
        if: env.HAS_PROFILE_OVERRIDE == 'true'
        env:
          PROFILE_OVERRIDE_JSON: ${{ secrets.PROFILE_OVERRIDE_JSON }}
        run: python -m paper_recommender.profile_config --from-env PROFILE_OVERRIDE_JSON --output output/interests.json

      - name: Fetch arXiv papers
        run: |
          python -m paper_recommender.arxiv_source \
            --profile output/interests.json \
            --output output/papers.jsonl \
            --max-results 500

      - name: Fetch GitHub trending repositories
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python -m paper_recommender.github_trending \
            --profile output/interests.json \
            --output output/github_repos.jsonl \
            --limit 5

      - name: Fetch Supabase feedback
        if: env.HAS_SUPABASE == 'true'
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python -m paper_recommender.feedback --output output/feedback.json --limit 500

      - name: Load local feedback secret
        if: env.HAS_SUPABASE != 'true' && env.HAS_LOCAL_FEEDBACK == 'true'
        env:
          LOCAL_FEEDBACK_JSON: ${{ secrets.LOCAL_FEEDBACK_JSON }}
        run: python -m paper_recommender.feedback --from-env LOCAL_FEEDBACK_JSON --output output/feedback.json

      - name: Fetch Supabase recommendation history
        if: env.HAS_SUPABASE == 'true'
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python -m paper_recommender.history fetch --output output/history.json --limit 1000

      - name: Merge recommendation sources
        run: cat output/papers.jsonl output/github_repos.jsonl > output/candidates.jsonl

      - name: Build recommendation payload
        run: |
          python -m paper_recommender.pipeline \
            --input output/candidates.jsonl \
            --profile output/interests.json \
            --feedback output/feedback.json \
            --history output/history.json \
            --output site/recommendations.json \
            --run-date "$(date -u +%F)" \
            --limit 45 \
            --min-count 45 \
            --exploration-count 30

      - name: Judge recommendations with LLM
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL || 'https://opencode.ai/zen/go/v1' }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'deepseek-v4-flash' }}
        run: |
          REQUIRE_API=""
          if [ "$HAS_LLM" = "true" ]; then
            REQUIRE_API="--require-api"
          fi
          python -m paper_recommender.judge \
            --input site/recommendations.json \
            --output site/recommendations.json \
            --limit 15 --exploration-limit 5 $REQUIRE_API

      - name: Enrich author affiliations
        run: |
          python -m paper_recommender.affiliations \
            --input site/recommendations.json \
            --output site/recommendations.json \
            --max-items 20

      - name: Enrich TLDR summaries
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL || 'https://opencode.ai/zen/go/v1' }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'deepseek-v4-flash' }}
        run: |
          REQUIRE_API=""
          if [ "$HAS_LLM" = "true" ]; then
            REQUIRE_API="--require-api"
          fi
          python -m paper_recommender.summarizer \
            --input site/recommendations.json \
            --output site/recommendations.json $REQUIRE_API

      - name: Generate LLM profile review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL || 'https://opencode.ai/zen/go/v1' }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'deepseek-v4-flash' }}
        run: |
          REQUIRE_API=""
          if [ "$HAS_LLM" = "true" ]; then
            REQUIRE_API="--require-api"
          fi
          python -m paper_recommender.profile_review \
            --profile output/interests.json \
            --recommendations site/recommendations.json \
            --output site/profile_review.json $REQUIRE_API

      - name: Inject public feedback config
        run: |
          cp output/interests.json site/interests.json
          cat > site/config.js <<'EOF'
          window.RECOMMENDER_CONFIG = {
            supabaseUrl: "${{ vars.SUPABASE_URL }}",
            supabaseAnonKey: "${{ vars.SUPABASE_ANON_KEY }}",
          };
          EOF

      - name: Publish subsystem status
        env:
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL || 'https://opencode.ai/zen/go/v1' }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'deepseek-v4-flash' }}
        run: python -m paper_recommender.status --output site/status.json

      - name: Send email digest
        if: env.HAS_SMTP == 'true'
        env:
          SITE_BASE_URL: ${{ env.SITE_BASE_URL }}
          FEEDBACK_BASE_URL: ${{ env.SITE_BASE_URL }}/feedback.html
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
        run: python -m paper_recommender.email_delivery --recommendations site/recommendations.json --max-attempts 3

      - name: Publish Supabase recommendation history
        if: env.HAS_SUPABASE == 'true'
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python -m paper_recommender.history publish --recommendations site/recommendations.json

      - name: Check liked papers archive branch
        id: favorites_archive_branch
        if: env.HAS_SUPABASE == 'true' && env.HAS_FAVORITES_ARCHIVE == 'true'
        env:
          LIKED_PAPERS_REPO: ${{ vars.LIKED_PAPERS_REPO }}
          LIKED_PAPERS_REPO_TOKEN: ${{ secrets.LIKED_PAPERS_REPO_TOKEN }}
        run: |
          set -euo pipefail
          status="$(curl -sS -o /tmp/favorites-archive-branch.json -w "%{http_code}" \
            -H "Authorization: Bearer ${LIKED_PAPERS_REPO_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${LIKED_PAPERS_REPO}/branches/main")"
          if [ "$status" = "200" ]; then
            echo "has_main=true" >> "$GITHUB_OUTPUT"
          elif [ "$status" = "404" ]; then
            echo "has_main=false" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/favorites-archive-branch.json
            exit 1
          fi

      - name: Checkout liked papers archive
        if: env.HAS_SUPABASE == 'true' && env.HAS_FAVORITES_ARCHIVE == 'true' && steps.favorites_archive_branch.outputs.has_main == 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.LIKED_PAPERS_REPO }}
          token: ${{ secrets.LIKED_PAPERS_REPO_TOKEN }}
          ref: main
          path: favorites-archive

      - name: Initialize liked papers archive checkout
        if: env.HAS_SUPABASE == 'true' && env.HAS_FAVORITES_ARCHIVE == 'true' && steps.favorites_archive_branch.outputs.has_main != 'true'
        env:
          LIKED_PAPERS_REPO: ${{ vars.LIKED_PAPERS_REPO }}
          LIKED_PAPERS_REPO_TOKEN: ${{ secrets.LIKED_PAPERS_REPO_TOKEN }}
        run: |
          set -euo pipefail
          ARCHIVE_URL="https://github.com/${LIKED_PAPERS_REPO}.git"
          git init -b main favorites-archive
          git -C favorites-archive remote add origin "$ARCHIVE_URL"
          git -C favorites-archive remote set-url origin "https://x-access-token:${LIKED_PAPERS_REPO_TOKEN}@github.com/${LIKED_PAPERS_REPO}.git"

      - name: Export liked papers archive
        if: env.HAS_SUPABASE == 'true' && env.HAS_FAVORITES_ARCHIVE == 'true'
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          LIKED_PAPERS_REPO: ${{ vars.LIKED_PAPERS_REPO }}
          LIKED_PAPERS_REPO_TOKEN: ${{ secrets.LIKED_PAPERS_REPO_TOKEN }}
        run: python -m paper_recommender.favorites_archive --output-dir favorites-archive

      - name: Commit liked papers archive
        if: env.HAS_SUPABASE == 'true' && env.HAS_FAVORITES_ARCHIVE == 'true'
        run: |
          cd favorites-archive
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add .
            git commit -m "Update liked paper archive"
            git push origin HEAD:main
          else
            echo "No liked paper archive changes"
          fi

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
